<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>术数预测系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--card:#1e1e32;--gold:#e2b969;--gold-dim:#a8863a;--red:#c0392b;--text:#f0e6d3;--text-dim:#a89b8c;--border:#3a3a52;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:var(--gold)}

.header{text-align:center;padding:28px 16px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#12121f,var(--bg))}
.header h1{font-size:1.9rem;color:var(--gold);letter-spacing:.3em}
.header p{color:var(--text-dim);font-size:.85rem;margin-top:2px}

.container{max-width:900px;margin:0 auto;padding:20px 14px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.card-title{padding:12px 16px;color:var(--gold);font-size:.95rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);user-select:none}
.card-title:hover{background:rgba(226,185,105,.05)}
.card-title .arrow{transition:transform .2s;font-size:.7rem}
.card-title.collapsed .arrow{transform:rotate(-90deg)}
.card-body{padding:16px}
.card-body.hidden{display:none}

.form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.form-group{flex:1;min-width:100px}
.form-group label{display:block;font-size:.82rem;color:var(--text-dim);margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:.9rem}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:56px}

.method-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.method-btn{padding:6px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-dim);cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .2s}
.method-btn:hover{border-color:var(--gold-dim);color:var(--text)}
.method-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(226,185,105,.1)}

.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.role-card{border:1px solid var(--border);border-radius:6px;background:var(--bg2);padding:10px;text-align:left;cursor:pointer;color:var(--text);font-family:inherit;transition:all .2s;min-height:112px}
.role-card:hover{border-color:var(--gold-dim)}
.role-card.active{border-color:var(--gold);box-shadow:0 0 0 1px rgba(226,185,105,.25)}
.role-card.disabled{opacity:.55}
.role-card .name{color:var(--gold);font-weight:700;font-size:1rem}
.role-card .avatar{color:var(--text-dim);font-size:.78rem;margin-top:2px}
.role-card .specialty{font-size:.82rem;margin-top:8px}
.role-card .meta{color:var(--text-dim);font-size:.74rem;margin-top:8px}
.role-card .warn{color:#e88}

.btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.btn{padding:9px 24px;border:1px solid var(--gold-dim);border-radius:4px;background:transparent;color:var(--gold);font-family:inherit;font-size:.95rem;cursor:pointer;transition:all .2s}
.btn:hover{background:var(--gold);color:var(--bg)}
.btn-primary{background:var(--gold);color:var(--bg);font-weight:700}
.btn-primary:hover{background:#f0c97a}
.btn-red{border-color:var(--red);color:#e88}
.btn-red:hover{background:var(--red);color:#fff}
.btn:disabled{opacity:.35;cursor:not-allowed}
.mode-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2)}
.mode-row.disabled{opacity:.55}
.mode-copy{font-size:.82rem;color:var(--text-dim)}
.mode-copy strong{display:block;color:var(--text);font-size:.88rem}
.toggle{display:flex;align-items:center;gap:8px;color:var(--gold);font-size:.86rem;white-space:nowrap;cursor:pointer}
.toggle input{width:16px;height:16px;accent-color:var(--gold)}
.toggle input:disabled{cursor:not-allowed}

.section-label{font-size:.85rem;color:var(--text-dim);border-left:3px solid var(--gold-dim);padding-left:8px;margin:12px 0 8px}

.pillars{display:flex;gap:10px;justify-content:center;margin:8px 0}
.pillar{text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 14px;min-width:70px}
.pillar .pos{font-size:.75rem;color:var(--text-dim)}
.pillar .gz{font-size:1.3rem;color:var(--gold);font-weight:700;margin:2px 0}
.pillar .ss{font-size:.75rem;color:var(--text-dim)}

.qimen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:540px;margin:8px auto}
.qimen-cell{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:6px;text-align:center;font-size:.78rem;line-height:1.5}
.qimen-cell .gua{font-weight:700;color:var(--gold);font-size:.85rem}
.qimen-cell .fw{color:var(--text-dim);font-size:.72rem}
.qimen-cell .tian{color:#7ec8e3}.qimen-cell .di{color:#a3d977}
.qimen-cell .xing{color:#e8a87c}.qimen-cell .men{color:#d4a5e5}.qimen-cell .shen{color:#f7dc6f}
.qimen-cell .ji{color:var(--gold);font-size:.72rem}.qimen-cell .xiong{color:var(--red);font-size:.72rem}

.liuyao-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.85rem}
.liuyao-table th,.liuyao-table td{border:1px solid var(--border);padding:5px 8px;text-align:center}
.liuyao-table th{background:var(--bg2);color:var(--gold)}
.dong{color:var(--red);font-weight:700}
.shi-mark{color:var(--gold)}.ying-mark{color:#7ec8e3}

.meihua-row{display:flex;gap:10px;margin:8px 0;flex-wrap:wrap}
.meihua-gua{flex:1;min-width:120px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.meihua-gua .label{font-size:.8rem;color:var(--text-dim)}
.meihua-gua .name{font-size:1.1rem;color:var(--gold);font-weight:700;margin:2px 0}
.meihua-gua .detail{font-size:.78rem;color:var(--text-dim)}

.ai-result{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px;min-height:60px;font-size:.92rem;line-height:1.8}
.ai-result h1,.ai-result h2,.ai-result h3{margin:12px 0 6px;color:var(--gold)}
.ai-result h1{font-size:1.3rem;border-bottom:1px solid var(--border);padding-bottom:6px}
.ai-result h2{font-size:1.15rem}
.ai-result h3{font-size:1.05rem}
.ai-result p{margin:6px 0;line-height:1.8}
.ai-result ul,.ai-result ol{padding-left:20px;margin:6px 0}
.ai-result li{margin:3px 0}
.ai-result strong{color:var(--gold);font-weight:700}
.ai-result em{color:var(--text-dim)}
.ai-result code{background:var(--bg);padding:2px 5px;border-radius:3px;font-size:.88rem}
.ai-result blockquote{border-left:3px solid var(--gold-dim);padding:6px 12px;color:var(--text-dim);margin:8px 0}
.ai-result table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.85rem}
.ai-result th,.ai-result td{border:1px solid var(--border);padding:5px 8px;text-align:left}
.ai-result th{background:var(--bg2);color:var(--gold)}
.ai-result hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.ai-result .error-box{border:1px solid #8f3434;background:rgba(192,57,43,.12);color:#ffd5d5;border-radius:6px;padding:10px 12px}
.ai-result .cursor{display:inline-block;width:2px;height:1em;background:var(--gold);animation:blink .8s step-end infinite;vertical-align:text-bottom}
@keyframes blink{50%{opacity:0}}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:var(--bg);padding:8px 24px;border-radius:20px;font-size:.9rem;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.footer{text-align:center;padding:18px;color:var(--text-dim);font-size:.75rem;border-top:1px solid var(--border);margin-top:32px}

@media(max-width:600px){
  .form-row{flex-direction:column}
  .form-group{min-width:100%}
  .header h1{font-size:1.4rem;letter-spacing:.1em}
  .qimen-grid{font-size:.7rem}.qimen-cell{padding:3px}
  .pillars{gap:6px}.pillar{padding:6px 8px;min-width:55px}
}
</style>
<!-- Markdown 解析器 + XSS 防护 -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>

<div class="header">
  <h1>术数预测</h1>
  <p>八字 · 奇门遁甲 · 六爻 · 梅花易数 — AI 综合解读</p>
</div>

<div class="container">

  <!-- Divination Form -->
  <div class="card">
    <div class="card-title" style="cursor:default"><span>起卦</span></div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group" style="flex:3;min-width:100%">
          <label>请问何事</label>
          <textarea id="event" placeholder="输入你想预测的事情，如：今年创业能成功吗？"></textarea>
        </div>
      </div>

      <div class="section-label">起卦时间（自动取当前时刻，可手动修改）</div>
      <div class="form-row">
        <div class="form-group"><label>日期</label><input type="date" id="q_date"></div>
        <div class="form-group"><label>时间</label><input type="time" id="q_time"></div>
        <div class="form-group" style="flex:0 0 auto;align-self:flex-end"><button class="btn" onclick="refreshTime()" style="padding:7px 12px;font-size:.82rem">此刻</button></div>
      </div>

      <div class="form-row">
        <div class="form-group"><label>经度</label><input type="number" id="q_lng" step="0.000001" placeholder="自动定位或手动填写"></div>
        <div class="form-group"><label>纬度</label><input type="number" id="q_lat" step="0.000001" placeholder="自动定位或手动填写"></div>
        <div class="form-group"><label>性别</label>
          <select id="q_gender"><option value="男">男</option><option value="女">女</option></select>
        </div>
      </div>

      <div class="section-label">出生时间（八字/紫微需完整，大六壬仅需年份）</div>
      <div class="form-row">
        <div class="form-group"><label>出生年</label><input type="number" id="b_year" placeholder="如1990"></div>
        <div class="form-group"><label>月</label><input type="number" id="b_month" min="1" max="12" placeholder="1-12"></div>
        <div class="form-group"><label>日</label><input type="number" id="b_day" min="1" max="31" placeholder="1-31"></div>
        <div class="form-group"><label>时</label><input type="number" id="b_hour" min="0" max="23" placeholder="0-23"></div>
        <div class="form-group"><label>分</label><input type="number" id="b_minute" min="0" max="59" placeholder="0-59"></div>
      </div>

      <div class="form-group">
        <label>选择术数</label>
        <div class="method-group" id="methodGroup">
          <button class="method-btn active" data-val="八字" onclick="toggleMethod(this)">八字</button>
          <button class="method-btn active" data-val="紫微" onclick="toggleMethod(this)">紫微斗数</button>
          <button class="method-btn" data-val="大六壬" onclick="toggleMethod(this)">大六壬</button>
          <button class="method-btn active" data-val="奇门" onclick="toggleMethod(this)">奇门遁甲</button>
          <button class="method-btn" data-val="六爻" onclick="toggleMethod(this)">六爻</button>
          <button class="method-btn active" data-val="梅花" onclick="toggleMethod(this)">梅花易数</button>
        </div>
      </div>

      <div class="section-label">起卦参数（可选，不填则用时间自动起卦）</div>
      <div class="form-row">
        <div class="form-group"><label>六爻数字1</label><input type="number" id="liuyao_n1" placeholder="如6"></div>
        <div class="form-group"><label>六爻数字2</label><input type="number" id="liuyao_n2" placeholder="如8"></div>
        <div class="form-group"><label>梅花数字1</label><input type="number" id="meihua_n1" placeholder="如3"></div>
        <div class="form-group"><label>梅花数字2</label><input type="number" id="meihua_n2" placeholder="如7"></div>
        <div class="form-group"><label>方位角</label><input type="number" id="q_azimuth" step="1" min="0" max="360" placeholder="0-360"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btnDivine" onclick="doDivine()">起卦</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="resultArea" style="display:none">
    <div class="card" id="baziCard" style="display:none">
      <div class="card-title" onclick="toggleCard(this)"><span>四柱八字</span><span class="arrow">▼</span></div>
      <div class="card-body" id="baziResult"></div>
    </div>
    <div class="card" id="ziweiCard" style="display:none">
      <div class="card-title" onclick="toggleCard(this)"><span>紫微斗数</span><span class="arrow">▼</span></div>
      <div class="card-body" id="ziweiResult"></div>
    </div>
    <div class="card" id="daliurenCard" style="display:none">
      <div class="card-title" onclick="toggleCard(this)"><span>大六壬</span><span class="arrow">▼</span></div>
      <div class="card-body" id="daliurenResult"></div>
    </div>
    <div class="card" id="qimenCard" style="display:none">
      <div class="card-title" onclick="toggleCard(this)"><span>奇门遁甲</span><span class="arrow">▼</span></div>
      <div class="card-body" id="qimenResult"></div>
    </div>
    <div class="card" id="liuyaoCard" style="display:none">
      <div class="card-title" onclick="toggleCard(this)"><span>六爻</span><span class="arrow">▼</span></div>
      <div class="card-body" id="liuyaoResult"></div>
    </div>
    <div class="card" id="meihuaCard" style="display:none">
      <div class="card-title" onclick="toggleCard(this)"><span>梅花易数</span><span class="arrow">▼</span></div>
      <div class="card-body" id="meihuaResult"></div>
    </div>

    <div style="text-align:center;margin:16px 0">
      <button class="btn" onclick="exportText()">导出卦象</button>
      <button class="btn" onclick="copyDivinationText()">复制卦象</button>
    </div>
  </div>

  <!-- Interpret Area -->
  <div id="interpretArea" style="display:none">
    <div class="card">
      <div class="card-title" style="cursor:default"><span>选择大师解卦</span></div>
      <div class="card-body">
        <div class="role-grid" id="roleGrid">
          <div style="color:var(--text-dim);font-size:.85rem">正在加载角色...</div>
        </div>
        <div class="mode-row disabled" id="lenientModeRow">
          <div class="mode-copy">
            <strong>本地宽松模式</strong>
            <span id="lenientModeHint">仅本地模型可用，减少合法内容误拒</span>
          </div>
          <label class="toggle"><input type="checkbox" id="lenientMode">启用</label>
        </div>
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:.85rem;color:var(--text-dim);margin-bottom:6px">解卦模式</label>
          <div class="method-group" id="interpretModeGroup">
            <button class="method-btn active" data-val="concise" onclick="toggleInterpretMode(this)">简洁模式</button>
            <button class="method-btn" data-val="expert" onclick="toggleInterpretMode(this)">专家模式</button>
          </div>
          <div style="font-size:.75rem;color:var(--text-dim);margin-top:4px">
            简洁模式：快速综合分析 | 专家模式：详细专业解读
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="btnInterpret2" onclick="doInterpret2()">解卦</button>
          <button class="btn btn-red" id="btnAdvice2" onclick="doAdvice2()">破局建议</button>
        </div>
      </div>
    </div>
    <div id="interpretHistory"></div>
  </div>

</div>

<div class="toast" id="toast"></div>
<div class="footer">术数预测系统 · 排盘由算法完成，解读由大模型生成 · 仅供参考，切勿迷信</div>

<script>
function $(id){return document.getElementById(id)}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function toggleCard(el){el.classList.toggle('collapsed');const b=el.nextElementSibling;b.classList.toggle('hidden')}
function toggleMethod(el){el.classList.toggle('active')}
function getMethods(){return[...document.querySelectorAll('#methodGroup .method-btn.active')].map(e=>e.dataset.val)}
function escapeHTML(text){return String(text??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}

// ===== Roles =====
let roles=[];
let selectedRoleId=null;
let interpretMode='concise'; // 'concise' 或 'expert'

function toggleInterpretMode(el){
  document.querySelectorAll('#interpretModeGroup .method-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  interpretMode=el.dataset.val;
}

function getInterpretMode(){
  return interpretMode;
}

function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms))}
async function fetchJsonWithRetry(url, options={}, retries=3){
  let lastError;
  for(let attempt=0;attempt<retries;attempt++){
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),options.timeout||8000);
    try{
      const res=await fetch(url,{...options,signal:controller.signal});
      if(!res.ok) throw new Error(await readError(res));
      return await res.json();
    }catch(e){
      lastError=e;
      if(attempt<retries-1) await sleep(350*(attempt+1));
    }finally{
      clearTimeout(timeout);
    }
  }
  throw lastError;
}

async function loadRoles(showLoading=true){
  if(showLoading){
    $('roleGrid').innerHTML='<div style="color:var(--text-dim);font-size:.85rem">正在加载角色...</div>';
  }
  try{
    const data=await fetchJsonWithRetry('/api/roles',{},4);
    roles=data.roles||[];
    const defaultRole=roles.find(r=>r.is_default)||roles[0];
    selectedRoleId=defaultRole?.id||null;
    renderRoles();
  }catch(e){
    $('roleGrid').innerHTML='<div style="color:#e88;font-size:.85rem">角色加载失败，请稍后重试 <button class="btn" style="margin-left:8px;padding:4px 10px;font-size:.78rem" onclick="loadRoles()">重试</button></div>';
    updateLenientMode();
  }
}
function selectRole(id){
  selectedRoleId=id;
  renderRoles();
}
function renderRoles(){
  if(!roles.length){
    $('roleGrid').innerHTML='<div style="color:var(--text-dim);font-size:.85rem">暂无可用角色，请先到后台配置</div>';
    updateLenientMode();
    return;
  }
  $('roleGrid').innerHTML=roles.map(r=>{
    const cls=['role-card'];
    if(r.id===selectedRoleId) cls.push('active');
    if(!r.is_configured) cls.push('disabled');
    const configured=r.is_configured?'已配置':'待配置';
    const warn=r.is_configured?'':' warn';
    const location=r.is_local?'本地':'云端';
    return `<button type="button" class="${cls.join(' ')}" onclick="selectRole(${r.id})">
      <div class="name">${escapeHTML(r.name)}</div>
      <div class="avatar">${escapeHTML(r.avatar_style||'角色')}</div>
      <div class="specialty">${escapeHTML(r.specialty||'综合解读')}</div>
      <div class="meta${warn}">${escapeHTML(r.provider_name||'')} · ${escapeHTML(r.model||'')} · ${location} · ${configured}</div>
    </button>`;
  }).join('');
  updateLenientMode();
}
function getSelectedRole(){
  return roles.find(x=>x.id===selectedRoleId);
}
function getSelectedRoleName(){
  const r=getSelectedRole();
  return r?r.name:'未知';
}
function stripReasoningText(text){
  let s=String(text||'');
  const patterns=[
    /(?:^|\n)\s*(?:Here'?s a thinking process|Thinking process|Reasoning process|Analysis)\s*:[\s\S]*?(?=\n\s*(?:\d+\.\s*【|#{1,3}\s|【)|$)/i,
    /(?:^|\n)\s*(?:思考过程|推理过程|分析过程)\s*[:：][\s\S]*?(?=\n\s*(?:\d+\.\s*【|#{1,3}\s|【)|$)/,
  ];
  for(const pattern of patterns)s=s.replace(pattern,'\n');
  return s.trim();
}
function updateLenientMode(){
  const row=$('lenientModeRow');
  const input=$('lenientMode');
  const hint=$('lenientModeHint');
  if(!row||!input||!hint)return;
  const r=getSelectedRole();
  const enabled=!!(r&&r.is_local&&r.is_configured);
  input.disabled=!enabled;
  if(!enabled)input.checked=false;
  row.classList.toggle('disabled',!enabled);
  hint.textContent=enabled?'仅对本地模型生效：合法内容尽量直接回答':'仅本地且已配置的模型可启用';
}
function getLenientMode(){
  const r=getSelectedRole();
  return !!($('lenientMode')?.checked&&r?.is_local);
}

// ===== DateTime =====
function refreshTime(){
  const now=new Date();
  const y=now.getFullYear();
  const m=String(now.getMonth()+1).padStart(2,'0');
  const d=String(now.getDate()).padStart(2,'0');
  $('q_date').value=`${y}-${m}-${d}`;
  $('q_time').value=now.toTimeString().slice(0,5);
}
function getDateTime(){
  const now=new Date();
  const fallbackDate=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const d=$('q_date').value||fallbackDate;
  const t=$('q_time').value||'12:00';
  const[year,month,day]=d.split('-').map(Number);
  const[hour,minute]=t.split(':').map(Number);
  return{year,month,day,hour,minute:minute||0};
}
function getBirthTime(){
  const y=parseInt($('b_year').value)||0;
  const m=parseInt($('b_month').value)||0;
  const d=parseInt($('b_day').value)||0;
  const h=parseInt($('b_hour').value);
  const min=parseInt($('b_minute').value)||0;
  if(y&&m&&d&&!isNaN(h)) return{year:y,month:m,day:d,hour:h,minute:min};
  return null;
}

function setLocationInputs(lng,lat){
  if(Number.isFinite(lng)) $('q_lng').value=lng.toFixed(6);
  if(Number.isFinite(lat)) $('q_lat').value=lat.toFixed(6);
}
function initGeoLocation(){
  if(!navigator.geolocation){toast('当前浏览器不支持自动定位，可手动填写经纬度');return}
  const host=location.hostname;
  const isLocalhost=host==='localhost'||host==='127.0.0.1'||host==='::1';
  if(!window.isSecureContext&&!isLocalhost){toast('手机浏览器定位需要 HTTPS；当前页面可手动填写经纬度');return}
  navigator.geolocation.getCurrentPosition(
    pos=>{setLocationInputs(pos.coords.longitude,pos.coords.latitude);toast('已自动获取当前位置')},
    err=>{const tips={1:'定位权限被拒绝，可手动填写经纬度',2:'暂时无法获取定位，可手动填写经纬度',3:'定位超时，可手动填写经纬度'};toast(tips[err.code]||'自动定位失败，可手动填写经纬度')},
    {enableHighAccuracy:true,timeout:10000,maximumAge:300000}
  );
}

// ===== Build Request =====
function buildRequest(){
  const event=$('event').value.trim();
  if(!event){toast('请输入事件描述');return null}
  const methods=getMethods();
  if(!methods.length){toast('请至少选择一种术数');return null}
  const dt=getDateTime();
  const longitude=parseFloat($('q_lng').value);
  const latitude=parseFloat($('q_lat').value);
  if(!Number.isFinite(longitude)||!Number.isFinite(latitude)){toast('请先允许定位，或手动填写经纬度');return null}
  const req={event,methods,year:dt.year,month:dt.month,day:dt.day,hour:dt.hour,minute:dt.minute,longitude,latitude,gender:$('q_gender').value};
  const birth=getBirthTime();
  if(birth){req.birth_year=birth.year;req.birth_month=birth.month;req.birth_day=birth.day;req.birth_hour=birth.hour;req.birth_minute=birth.minute}
  else{
    // 如果选择了大六壬，至少需要出生年份
    const byear=parseInt($('b_year').value)||0;
    if(byear&&methods.includes('大六壬')) req.birth_year=byear;
  }
  const ln1=parseInt($('liuyao_n1').value),ln2=parseInt($('liuyao_n2').value);
  if(!isNaN(ln1)&&!isNaN(ln2)) req.liuyao_nums=[ln1,ln2];
  const mn1=parseInt($('meihua_n1').value),mn2=parseInt($('meihua_n2').value);
  if(!isNaN(mn1)&&!isNaN(mn2)) req.meihua_nums=[mn1,mn2];
  const az=parseFloat($('q_azimuth').value);
  if(!isNaN(az)) req.azimuth=az;
  return req;
}

// ===== SSE Stream Helper =====
async function streamSSE(url, body, el){
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok) throw new Error(await readError(res));
  const reader=res.body.getReader();
  const decoder=new TextDecoder();
  let fullText='',buffer='',streamError=null;
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    buffer+=decoder.decode(value,{stream:true});
    const lines=buffer.split('\n');buffer=lines.pop();
    for(const line of lines){
      if(!line.startsWith('data:'))continue;
      try{
        const obj=JSON.parse(line.slice(5).trim());
        if(obj.error){
          streamError=obj.trace_id?`[${obj.trace_id}] ${obj.error}`:obj.error;
          el.innerHTML=`<div class="error-box"><strong>AI 请求失败</strong><br>${escapeHTML(streamError)}</div>`;
          toast('AI 请求失败');continue;
        }
        if(obj.token){
          fullText+=obj.token;
          if(typeof marked!=='undefined'&&typeof DOMPurify!=='undefined'){el.innerHTML=DOMPurify.sanitize(marked.parse(fullText))+'<span class="cursor"></span>'}
          else{el.innerHTML=fullText.replace(/\n/g,'<br>')+'<span class="cursor"></span>'}
        }
      }catch{}
    }
  }
  if(streamError) throw new Error(streamError);
  fullText=stripReasoningText(fullText);
  if(typeof marked!=='undefined'&&typeof DOMPurify!=='undefined'){el.innerHTML=DOMPurify.sanitize(marked.parse(fullText))}
  else{el.innerHTML=fullText.replace(/\n/g,'<br>')}
  return fullText;
}

  const d=lastDivineData;
  const r=d['术数结果']||{};
  let t='';
  t+='==================== 术数排盘 ====================\n';
  if(includeEvent) t+=`事件：${d['事件']||''}\n`;
  const st=d['时空坐标']||{};
  t+=`时间：${st['时间']||''}\n`;
  t+=`经度：${st['经度']||''}  纬度：${st['纬度']||''}  城市：${st['城市估算']||''}\n`;
  const bz=r['八字'];
  if(bz&&bz['性别']) t+=`性别：${bz['性别']}\n`;
  else if(lastRequest) t+=`性别：${lastRequest.gender||''}\n`;
  if(bz&&bz['真太阳时']) t+=`真太阳时：${bz['真太阳时']}\n`;
  t+='\n';
  t+=exportBazi(bz);
  t+=exportZiwei(r['紫微斗数']);
  t+=exportDaliuren(r['大六壬']);
  t+=exportQimen(r['奇门遁甲']);
  t+=exportLiuyao(r['六爻']);
  t+=exportMeihua(r['梅花易数']);
  t+='==================================================\n';
  return t;
}

function exportText(){
  if(!lastDivineData){toast('请先起卦');return}
  const d=lastDivineData;
  const t=buildDivinationText(true);
  downloadText(t,`卦象_${(d['事件']||'').slice(0,10)}_${new Date().toISOString().slice(0,10)}.txt`);
}

async function copyDivinationText(){
  if(!lastDivineData){toast('请先起卦');return}
  const text=buildDivinationText(false);
  try{
    if(navigator.clipboard&&window.isSecureContext){
      await navigator.clipboard.writeText(text);
    }else{
      const ta=document.createElement('textarea');
      ta.value=text;
      ta.style.position='fixed';
      ta.style.left='-9999px';
      ta.style.top='0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    toast('已复制卦象');
  }catch(e){
    toast('复制失败，请手动选择导出文本');
  }
}

function exportBazi(data){
  if(!data||data['错误']) return '';
  let t='────────── 四柱八字 ──────────\n';
  const p=data['四柱']||{};
  t+='       年柱    月柱    日柱    时柱\n';
  t+=`干支：  ${pad(p['年柱'])}${pad(p['月柱'])}${pad(p['日柱'])}${p['时柱']||''}\n`;
  const ny=data['纳音']||{};
  t+=`纳音：  ${pad(ny['年柱'],6)}${pad(ny['月柱'],6)}${pad(ny['日柱'],6)}${ny['时柱']||''}\n`;
  t+=`\n日主：${data['日主五行']||''}${data['日主阴阳']||''} · ${data['日主强弱']?.判断||''}\n`;
  t+=`      ${data['日主强弱']?.说明||''}\n`;
  const wx=data['五行力量']||{};
  const total=Object.values(wx).reduce((a,b)=>a+b,0)||1;
  t+='五行：'+Object.entries(wx).map(([k,v])=>`${k}${(v/total*100).toFixed(0)}%`).join(' ')+'\n';
  const ss=data['神煞']||{};const parts=[];
  if(ss['天乙贵人']?.length) parts.push('天乙贵人:'+ss['天乙贵人'].join(','));
  if(ss['驿马']?.length) parts.push('驿马:'+ss['驿马'].join(','));
  if(ss['桃花']?.length) parts.push('桃花:'+ss['桃花'].join(','));
  if(ss['旬空']?.length) parts.push('旬空:'+ss['旬空'].join(','));
  if(parts.length) t+='神煞：'+parts.join(' · ')+'\n';
  const dy=data['大运'];
  if(dy){
    t+=`\n大运：${dy['顺逆']||''} · 起运${dy['起运']?.['年龄']||''}\n`;
    t+=`      ${dy['依据']||''}\n`;
    const luck=(dy['运程']||[]).map(x=>`${x['年龄']||''} ${x['干支']||''}`).join(' | ');
    if(luck) t+=`  ${luck}\n`;
  }
  t+='\n';
  return t;
}

function exportZiwei(data){
  if(!data||data['错误']) return '';
  let t='────────── 紫微斗数 ──────────\n';
  if(data['农历月日']){
    t+=`农历：${data['农历月日']}`;
    if(data['闰月处理']) t+=`（排盘月${data['排盘月']||''}，${data['闰月处理']}）`;
    t+='\n';
  }
  t+=`命宫：${data['命宫']||''} · 身宫：${data['身宫']||''} · ${data['五行局']||''}\n`;
  t+=`紫微：${data['紫微星位']||''} · 天府：${data['天府星位']||''} · 大限：${data['大限方向']||''}\n`;
  const sh=data['四化']||{};
  t+=`四化：${sh['化禄']||''}禄 ${sh['化权']||''}权 ${sh['化科']||''}科 ${sh['化忌']||''}忌\n\n`;
  const gong12=data['十二宫']||{};
  for(const[name,info] of Object.entries(gong12)){
    const shen=info['身宫标记']?' ★身':'';
    const zx=Object.entries(info['主星']||{}).map(([x,mw])=>{const hua=info['四化']?.[x]||'';return `${x}(${mw}${hua?'·'+hua:''})`;}).join(' ');
    const fx=Object.entries(info['辅星']||{}).map(([x,mw])=>`${x}(${mw})`).join(' ');
    const stars=[zx,fx].filter(Boolean).join(' | ')||'空宫';
    t+=`  ${name}(${info['干支']||''})${shen}: ${stars}\n`;
  }
  const dx=(data['大限']||[]).map(x=>`${x['年龄段']} ${x['宫名']}`).join(' | ');
  if(dx) t+=`\n大限：${dx}\n`;
  t+='\n';
  return t;
}

function exportDaliuren(data){
  if(!data||data['错误']) return '';
  let t='────────── 大六壬 ──────────\n';
  t+=`日干支：${data['日干支']||''} · 时干支：${data['时干支']||''}\n`;
  t+=`月将：${data['月将']||''} · ${data['昼夜']||''}贵\n`;

  const sc=data['三传']||{};
  t+=`起传法：${sc['起传法']||''}\n\n`;

  t+='四课：\n';
  for(const ke of (data['四课']||[])){
    t+=`  ${ke['课名']||''}: ${ke['上支']||''}(${ke['上天将']||''}) 加 ${ke['下支']||''} → ${ke['关系']||''}\n`;
  }

  t+='\n三传：\n';
  for(const pos of ['初传','中传','末传']){
    const p=sc[pos]||{};
    t+=`  ${pos}: ${p['干支']||''} ${p['天将']||''}(${p['天将含义']||''}) ${p['五行']||''}(${p['旺衰']||''})\n`;
  }

  const ss=data['神煞']||{};
  if(ss['驿马']||ss['华盖']||ss['桃花']){
    t+=`\n神煞：驿马${ss['驿马']||''} 华盖${ss['华盖']||''} 桃花${ss['桃花']||''}`;
    if(ss['旬空']&&ss['旬空'].length) t+=` 旬空${ss['旬空'].join(',')}`;
    t+='\n';
  }

  if(data['本命']||data['行年']){
    t+=`本命：${data['本命']||''} 行年：${data['行年']||''}\n`;
  }

  t+='\n';
  return t;
}

function exportQimen(data){
  if(!data||data['错误']) return '';
  let t='────────── 奇门遁甲 ──────────\n';
  t+=`${data['遁型']||''}${data['局数']||''}局 · 值符:${data['值符星']||''} · 值使:${data['值使门']||''}\n`;
  t+=`日:${data['日干支']||''} · 时:${data['时干支']||''}`;
  if(data['旬空']?.length) t+=` · 旬空:${data['旬空'].join(',')}`;
  t+='\n\n';
  const palaces=data['九宫']||{};
  const order=[4,9,2,3,5,7,8,1,6];
  const labels=['东南','南','西南','东','中','西','东北','北','西北'];
  for(let i=0;i<9;i++){
    const g=order[i];
    if(g===5){t+=`[中五宫]\n`;continue}
    const p=palaces[g]||{};
    t+=`[${labels[i]}] ${p['八卦']||''} 天:${p['天盘']||''} 地:${p['地盘']||''} 星:${p['九星']||''} 门:${p['八门']||''} 神:${p['八神']||''}\n`;
  }
  const geju=data['格局']||[];
  if(geju.length) t+=`格局：${geju.join('；')}\n`;
  t+='\n';
  return t;
}

function exportLiuyao(data){
  if(!data||data['错误']) return '';
  let t='────────── 六爻 ──────────\n';
  t+=`${data['卦名']||''} · ${data['宫属']||''} · 月建:${data['月建']||''} · 日建:${data['日建']||''}`;
  if(data['月破地支']) t+=` · 月破:${data['月破地支']}`;
  if(data['旬空地支']?.length) t+=` · 旬空:${data['旬空地支'].join(',')}`;
  t+='\n\n';
  t+='爻位  干支  六亲  五行  标记\n';
  for(const y of(data['六爻']||[])){
    let marks=[];
    if(y['动爻']) marks.push(`动→${y['变支']||''}`);
    if(y['世']) marks.push('世');
    if(y['应']) marks.push('应');
    if(y['旬空']) marks.push('空');
    if(y['月破']) marks.push('破');
    t+=`${pad(y['爻名']+'爻',4)}  ${pad(y['干支'],4)}  ${pad(y['六亲'],4)}  ${pad(y['五行'],4)}  ${marks.join(' ')}\n`;
  }
  t+='\n';
  return t;
}

function exportMeihua(data){
  if(!data||data['错误']) return '';
  let t='────────── 梅花易数 ──────────\n';
  const bk=data['本卦']||{},hk=data['互卦']||{},ck=data['变卦']||{},ty=data['体用分析']||{};
  t+=`本卦：${bk['卦名']||''}（${bk['上卦']||''}上${bk['下卦']||''}下）\n`;
  t+=`互卦：${hk['卦名']||''}（${hk['上卦']||''}上${hk['下卦']||''}下）\n`;
  t+=`变卦：${ck['卦名']||''}（${ck['上卦']||''}上${ck['下卦']||''}下）\n`;
  t+=`动爻：第${data['动爻']||'?'}爻\n`;
  t+=`体：${ty['体卦']||''}(${ty['体五行']||''}) · 用：${ty['用卦']||''}(${ty['用五行']||''})\n`;
  t+=`${ty['体用关系']||''} — ${ty['断语']||''}\n`;
  t+='\n';
  return t;
}

function pad(s,len){s=String(s||'');len=len||6;while(s.length<len)s+=' ';return s}

function downloadText(text,filename){
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('已导出卦象');
}

window.addEventListener('DOMContentLoaded',()=>{
  loadRoles();
  refreshTime();
  initGeoLocation();
});
