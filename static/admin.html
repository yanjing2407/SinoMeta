<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台配置 - 术数预测</title>
<style>
:root{--bg:#0f0f1a;--bg2:#1a1a2e;--card:#1e1e32;--gold:#e2b969;--gold-dim:#a8863a;--red:#c0392b;--text:#f0e6d3;--text-dim:#a89b8c;--border:#3a3a52;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.55}
a{color:var(--gold)}
.header{padding:22px 18px;border-bottom:1px solid var(--border);background:#12121f}
.header-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;gap:12px;align-items:center}
.header h1{font-size:1.35rem;color:var(--gold)}
.header p{font-size:.82rem;color:var(--text-dim)}
.container{max-width:1100px;margin:0 auto;padding:18px}
.grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-title{padding:12px 14px;color:var(--gold);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-body{padding:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:.8rem;color:var(--text-dim);margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);font:inherit;font-size:.9rem}
textarea{min-height:130px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
.checks{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0 12px}
.checks label{display:flex;align-items:center;gap:6px;color:var(--text-dim);font-size:.86rem}
.checks input{width:auto}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
button{padding:8px 14px;border:1px solid var(--gold-dim);border-radius:4px;background:transparent;color:var(--gold);font:inherit;font-size:.9rem;cursor:pointer}
button:hover{background:var(--gold);color:var(--bg)}
button.secondary{border-color:var(--border);color:var(--text-dim)}
button.secondary:hover{background:var(--bg2);color:var(--text)}
.list{display:flex;flex-direction:column;gap:8px}
.item{border:1px solid var(--border);border-radius:6px;background:var(--bg2);padding:10px}
.item-head{display:flex;justify-content:space-between;gap:8px;align-items:start}
.item-title{font-weight:700;color:var(--gold)}
.item-meta{font-size:.8rem;color:var(--text-dim);margin-top:4px}
.badge{font-size:.72rem;border:1px solid var(--border);border-radius:999px;padding:2px 7px;color:var(--text-dim);white-space:nowrap}
.badge.ok{border-color:var(--gold-dim);color:var(--gold)}
.badge.off{border-color:var(--red);color:#e88}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:var(--bg);padding:8px 22px;border-radius:20px;font-size:.9rem;opacity:0;transition:all .25s;z-index:10}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:850px){.grid,.form-row{grid-template-columns:1fr}.header-inner{display:block}.header p{margin-top:4px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div>
      <h1>后台配置</h1>
      <p>管理大模型供应商和前台展示角色</p>
    </div>
    <a href="/">返回前台</a>
  </div>
</div>

<div class="container">
  <div class="card" style="margin-bottom:16px">
    <div class="card-title"><span>访问令牌</span></div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label>后台 Token</label>
          <input type="password" id="adminToken" placeholder="本机调试可留空；线上建议设置">
        </div>
        <div class="form-group" style="align-self:end">
          <button onclick="saveToken()">保存到本浏览器</button>
        </div>
      </div>
      <p style="font-size:.8rem;color:var(--text-dim)">线上部署建议在 systemd 中设置 <code>SINOMETA_ADMIN_TOKEN</code>，后台请求会使用 Bearer Token。</p>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-title"><span>模型配置</span><button class="secondary" onclick="newProvider()">空白新增</button></div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <label>按模板新增</label>
            <select id="providerTemplate"></select>
          </div>
          <div class="form-group" style="align-self:end">
            <button onclick="newProviderFromTemplate()">添加</button>
          </div>
        </div>
        <div class="form-group">
          <label>查询模型</label>
          <input id="providerSearch" placeholder="按名称、模型、Base URL 查询" oninput="renderProviders()">
        </div>
        <div class="list" id="providerList"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span id="providerFormTitle">新增模型</span></div>
      <div class="card-body">
        <input type="hidden" id="providerId">
        <div class="form-row">
          <div class="form-group"><label>名称</label><input id="providerName" placeholder="DeepSeek"></div>
          <div class="form-group"><label>模型</label><input id="providerModel" placeholder="deepseek-chat"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>接口类型</label>
            <select id="providerType">
              <option value="openai_compatible">OpenAI 兼容 / vLLM</option>
              <option value="ollama_native">Ollama 原生</option>
            </select>
          </div>
          <div class="form-group">
            <label>Base URL 示例</label>
            <input id="providerHint" value="OpenAI兼容填根地址或 /v1，例如 https://xxapi.com.cn 或 https://xxapi.com.cn/v1；不要填 /chat/completions" disabled>
          </div>
        </div>
        <div class="form-group"><label>Base URL</label><input id="providerBaseUrl" placeholder="https://api.deepseek.com"></div>
        <div class="form-group"><label>API Key</label><input type="password" id="providerApiKey" placeholder="编辑时留空表示不修改"></div>
        <div class="checks">
          <label><input type="checkbox" id="providerKeyRequired" checked> 需要 API Key</label>
          <label><input type="checkbox" id="providerActive" checked> 启用</label>
          <label><input type="checkbox" id="providerDefault"> 默认</label>
        </div>
        <div class="btn-row">
          <button onclick="saveProvider()">保存模型</button>
          <button class="secondary" onclick="newProvider()">清空</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span>角色配置</span><button class="secondary" onclick="newRole()">新增</button></div>
      <div class="card-body">
        <div class="list" id="roleList"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span id="roleFormTitle">新增角色</span></div>
      <div class="card-body">
        <input type="hidden" id="roleId">
        <div class="form-row">
          <div class="form-group"><label>角色名</label><input id="roleName" placeholder="玄机真人"></div>
          <div class="form-group"><label>头像风格</label><input id="roleAvatar" placeholder="仙风道骨老者"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>关联模型</label><select id="roleProvider"></select></div>
          <div class="form-group"><label>擅长</label><input id="roleSpecialty" placeholder="八字、奇门，事业决策"></div>
        </div>
        <div class="form-group"><label>System Prompt</label><textarea id="rolePrompt"></textarea></div>
        <div class="checks">
          <label><input type="checkbox" id="roleActive" checked> 启用</label>
          <label><input type="checkbox" id="roleDefault"> 默认</label>
        </div>
        <div class="btn-row">
          <button onclick="saveRole()">保存角色</button>
          <button class="secondary" onclick="newRole()">清空</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function $(id){return document.getElementById(id)}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function escapeHTML(text){return String(text??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}

let config={providers:[],roles:[]};
const providerTemplates=[
  {label:'自定义 OpenAI 兼容',name:'自定义模型',provider_type:'openai_compatible',base_url:'http://127.0.0.1:8000/v1',model:'model-name',api_key_required:false},
  {label:'自定义 Ollama 原生',name:'Ollama 自定义',provider_type:'ollama_native',base_url:'http://127.0.0.1:11434',model:'qwen2.5:7b',api_key_required:false},
  {label:'LM Studio 本地',name:'LM Studio 本地',provider_type:'openai_compatible',base_url:'http://127.0.0.1:1234/v1',model:'local-model',api_key_required:false},
  {label:'vLLM 本地',name:'vLLM 本地',provider_type:'openai_compatible',base_url:'http://127.0.0.1:8001/v1',model:'Qwen/Qwen2.5-7B-Instruct',api_key_required:false},
  {label:'Ollama 本地',name:'Ollama 本地',provider_type:'ollama_native',base_url:'http://127.0.0.1:11434',model:'qwen2.5:7b',api_key_required:false},
  {label:'DeepSeek',name:'DeepSeek',provider_type:'openai_compatible',base_url:'https://api.deepseek.com',model:'deepseek-chat',api_key_required:true},
  {label:'OpenAI',name:'OpenAI',provider_type:'openai_compatible',base_url:'https://api.openai.com/v1',model:'gpt-4o',api_key_required:true},
  {label:'智谱 GLM',name:'智谱 GLM',provider_type:'openai_compatible',base_url:'https://open.bigmodel.cn/api/paas/v4',model:'glm-4',api_key_required:true},
];

function authHeaders(){
  const token=localStorage.getItem('sinometa_admin_token')||'';
  return token?{'Authorization':'Bearer '+token}:{};
}
function saveToken(){
  localStorage.setItem('sinometa_admin_token',$('adminToken').value.trim());
  toast('Token 已保存');
  loadConfig();
}
async function requestJson(url, options={}){
  const headers={'Content-Type':'application/json',...authHeaders(),...(options.headers||{})};
  const res=await fetch(url,{...options,headers});
  if(!res.ok){
    let msg=await res.text();
    try{msg=JSON.parse(msg).detail||msg}catch{}
    throw new Error(msg);
  }
  return await res.json();
}
async function loadConfig(){
  try{
    config=await requestJson('/api/admin/config',{headers:{'Content-Type':'application/json'}});
    renderProviders();
    renderRoles();
    fillProviderSelect();
    fillProviderTemplates();
  }catch(e){toast('加载失败: '+e.message)}
}
function renderProviders(){
  const q=($('providerSearch')?.value||'').trim().toLowerCase();
  const providers=config.providers.filter(p=>{
    if(!q)return true;
    return [p.name,p.model,p.base_url,typeLabel(p.provider_type)].some(v=>String(v||'').toLowerCase().includes(q));
  });
  $('providerList').innerHTML=providers.map(p=>{
    const badges=[
      r.provider_configured?'<span class="badge ok">模型可用</span>':'<span class="badge off">模型未配置</span>',
      p.is_default?'<span class="badge ok">默认</span>':'',
      p.is_active?'<span class="badge ok">启用</span>':'<span class="badge off">停用</span>',
      '<span class="badge">'+typeLabel(p.provider_type)+'</span>',
      p.api_key_required
        ? (p.api_key_masked?'<span class="badge ok">Key '+escapeHTML(p.api_key_masked)+'</span>':'<span class="badge off">未配置 Key</span>')
        : '<span class="badge ok">免 Key</span>',
    ].join('');
    return `<div class="item">
      <div class="item-head"><div><div class="item-title">${escapeHTML(p.name)}</div><div class="item-meta">${escapeHTML(p.model)} · ${escapeHTML(p.base_url)}</div></div><div>${badges}</div></div>
      <div class="btn-row"><button class="secondary" onclick="editProvider(${p.id})">编辑</button></div>
    </div>`;
  }).join('')||'<div class="item"><div class="item-meta">没有匹配的模型配置</div></div>';
}
function renderRoles(){
  $('roleList').innerHTML=config.roles.map(r=>{
    const badges=[
      r.is_default?'<span class="badge ok">默认</span>':'',
      r.is_active?'<span class="badge ok">启用</span>':'<span class="badge off">停用</span>',
    ].join('');
    return `<div class="item">
      <div class="item-head"><div><div class="item-title">${escapeHTML(r.name)}</div><div class="item-meta">${escapeHTML(r.avatar_style||'角色')} · ${escapeHTML(r.provider_name||'未关联')} · ${escapeHTML(r.specialty||'综合解读')}</div></div><div>${badges}</div></div>
      <div class="btn-row"><button class="secondary" onclick="editRole(${r.id})">编辑</button></div>
    </div>`;
  }).join('')||'<div class="item"><div class="item-meta">暂无角色</div></div>';
}
function fillProviderSelect(){
  $('roleProvider').innerHTML=config.providers.map(p=>`<option value="${p.id}">${escapeHTML(p.name)} · ${escapeHTML(p.model)}</option>`).join('');
}
function fillProviderTemplates(){
  $('providerTemplate').innerHTML=providerTemplates.map((t,i)=>`<option value="${i}">${escapeHTML(t.label)}</option>`).join('');
}
function fillProviderSelect(){
  $('roleProvider').innerHTML=config.providers.map(p=>{
    const configured=p.is_active&&(p.api_key_required?!!p.api_key_masked:true);
    const state=configured?'可用':'未配置';
    return `<option value="${p.id}">${escapeHTML(p.name)} · ${escapeHTML(p.model)} · ${state}</option>`;
  }).join('');
}
function typeLabel(type){
  return type==='ollama_native'?'Ollama 原生':'OpenAI 兼容';
}
function newProvider(){
  $('providerFormTitle').textContent='新增模型';
  $('providerId').value='';
  $('providerName').value='';
  $('providerType').value='openai_compatible';
  $('providerBaseUrl').value='';
  $('providerModel').value='';
  $('providerApiKey').value='';
  $('providerKeyRequired').checked=true;
  $('providerActive').checked=true;
  $('providerDefault').checked=false;
}
function uniqueProviderName(name){
  const names=new Set(config.providers.map(p=>p.name));
  if(!names.has(name))return name;
  let i=2;
  while(names.has(`${name} ${i}`))i++;
  return `${name} ${i}`;
}
async function newProviderFromTemplate(){
  const t=providerTemplates[Number($('providerTemplate').value)||0];
  const payload={
    id:null,
    name:uniqueProviderName(t.name),
    provider_type:t.provider_type,
    base_url:t.base_url,
    model:t.model,
    api_key:'',
    api_key_required:!!t.api_key_required,
    is_active:true,
    is_default:false,
  };
  try{
    const saved=await requestJson('/api/admin/providers',{method:'POST',body:JSON.stringify(payload)});
    await loadConfig();
    editProvider(saved.id);
    toast('已添加一条模型配置');
  }catch(e){toast('添加失败: '+e.message)}
}
function editProvider(id){
  const p=config.providers.find(x=>x.id===id);if(!p)return;
  $('providerFormTitle').textContent='编辑模型';
  $('providerId').value=p.id;
  $('providerName').value=p.name;
  $('providerType').value=p.provider_type||'openai_compatible';
  $('providerBaseUrl').value=p.base_url;
  $('providerModel').value=p.model;
  $('providerApiKey').value='';
  $('providerKeyRequired').checked=!!p.api_key_required;
  $('providerActive').checked=!!p.is_active;
  $('providerDefault').checked=!!p.is_default;
  if((p.base_url||'').includes('127.0.0.1')||(p.base_url||'').includes('localhost')||(p.base_url||'').includes('192.168.')){
    $('providerHint').value='本地模型通常不需要 API Key，请取消“需要 API Key”；OpenAI兼容远程接口填根地址或 /v1。';
  }
}
async function saveProvider(){
  const payload={
    id:$('providerId').value?Number($('providerId').value):null,
    name:$('providerName').value.trim(),
    provider_type:$('providerType').value,
    base_url:$('providerBaseUrl').value.trim(),
    model:$('providerModel').value.trim(),
    api_key:$('providerApiKey').value.trim(),
    api_key_required:$('providerKeyRequired').checked,
    is_active:$('providerActive').checked,
    is_default:$('providerDefault').checked,
  };
  try{
    await requestJson('/api/admin/providers',{method:'POST',body:JSON.stringify(payload)});
    toast('模型已保存');
    await loadConfig();
  }catch(e){toast('保存失败: '+e.message)}
}
function newRole(){
  $('roleFormTitle').textContent='新增角色';
  $('roleId').value='';
  $('roleName').value='';
  $('roleAvatar').value='';
  $('roleSpecialty').value='';
  $('rolePrompt').value='';
  $('roleActive').checked=true;
  $('roleDefault').checked=false;
  if(config.providers[0]) $('roleProvider').value=config.providers[0].id;
}
function editRole(id){
  const r=config.roles.find(x=>x.id===id);if(!r)return;
  $('roleFormTitle').textContent='编辑角色';
  $('roleId').value=r.id;
  $('roleName').value=r.name;
  $('roleAvatar').value=r.avatar_style||'';
  $('roleProvider').value=r.llm_provider_id;
  $('roleSpecialty').value=r.specialty||'';
  $('rolePrompt').value=r.system_prompt||'';
  $('roleActive').checked=!!r.is_active;
  $('roleDefault').checked=!!r.is_default;
}
async function saveRole(){
  const payload={
    id:$('roleId').value?Number($('roleId').value):null,
    name:$('roleName').value.trim(),
    avatar_style:$('roleAvatar').value.trim(),
    llm_provider_id:Number($('roleProvider').value),
    system_prompt:$('rolePrompt').value.trim(),
    specialty:$('roleSpecialty').value.trim(),
    is_active:$('roleActive').checked,
    is_default:$('roleDefault').checked,
  };
  try{
    await requestJson('/api/admin/roles',{method:'POST',body:JSON.stringify(payload)});
    toast('角色已保存');
    await loadConfig();
  }catch(e){toast('保存失败: '+e.message)}
}

window.addEventListener('DOMContentLoaded',()=>{
  $('adminToken').value=localStorage.getItem('sinometa_admin_token')||'';
  loadConfig();
});
</script>
</body>
</html>
